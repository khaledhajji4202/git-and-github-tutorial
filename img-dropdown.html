<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Image</title>
    <style>
        .dropdown{
            position: relative;
        }
        .dropdown-content {
            display: none;
            position: relative;
            background-color: #f9f9f9;
            min-width: 160px;
        }
        .dropdown:hover .dropdown-content{
            display:block;
        }
        .desc {
            padding:15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Dropdown Image</h2>
<p>Move the mouse over 
  the image below to open the dropdown content.</p>
<div class="dropdown">
    <img src="img_5terre (1).jpg" alt="Cinque Terre" width="100" height="50">
    <div class="dropdown-content">
        <img src="img_5terre (1).jpg" alt="Cinque Terre" width="300" height="200">
        <div class="desc">Beautiful Cinque Terre</div>
    </div>
</div>
</body>
</html>
