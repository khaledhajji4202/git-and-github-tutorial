<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color-keywords</title>
    <style>
        body{
            background-image: url("img_5terre.jpg");
        }
        #div1 {
            background-color: lightgreen;
            border:2px solid black;
            padding:15px;
        }
        #div2 {
            color:red;
            background-color: transparent;
            box-shadow:0px 0px 15px currentColor;
            border: 2px solid currentcolor;
            padding:15px;
        }
    </style>
</head>
<body>
    <h2>The transparent Keyword</h2>
    <div id="div1">This div has a light green
        background color.
    </div>
    <br>
    <div id="div2">This div has a transparent 
        background color.
    </div>
</body>
</html>
