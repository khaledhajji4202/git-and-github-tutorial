<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>google-font-family</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide&effect=fire|outline|emboss|shadow-multiple|Sofia&effect=fire|Trirong&effect=fire">
    <style>
        body {
            background-color: black;
        }
        h1.a,h1.d,h1.e,h1.f {
            font-family:"Audiowide",sans-serif;
            font-weight:lighter;
            text-shadow: 4px 4px 4px blue;

        }
        h1.b {
            font-family:"Sofia",sans-serif;
            text-shadow: 4px 4px 4px rgb(0, 255, 30);
            
        }
        h1.c {
            font-family:"Trirong", serif;
            text-shadow:4px 4px 4px rgb(255, 221, 0);
        }
    </style>
</head>
<body>
    <h1 class="a font-effect-fire">Audiowide Font</h1>
    <h1 class="b font-effect-fire">Sofia Font</h1>
    <h1 class="c font-effect-fire">Trirong Font</h1>
    <h1 class="d font-efect-neon">Neon Effect</h1>
    <h1 class="e font-effect-outline">Outline Effect</h1>
    <h1 class="f font-effect-shadow-multiple">Multiple Shadow Effect </h1>
</body>
</html>
