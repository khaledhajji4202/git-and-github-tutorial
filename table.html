<!DOCTYPE html>
<html lang="en">
<head>
 <title>Table </title>
 <style>
    table {
        border: 3px solid black;
        border-collapse: collapse;
    }
    td,th {
        border: 3px solid black;
        padding: 5px;
    }
    th {
        text-align: left;
    }
    tr:nth-child(even){
        background-color:rgba(150,212,212,0.3);
    }
    td:nth-child(even),th:nth-child(even) {
      background-color: rgba(150,212,212,0.5);
    }
    
 </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Ocean</th>
                <th>Average Depth</th>
                <th>Maximum Depth</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Pacific Ocean  </td>
                <td>  4.280 m</td>
                <td> 10,911 m</td>
            </tr>
            <tr>
                <td>Atlantic Ocean</td>
                <td>3,646 m</td>
                <td>8,486 m</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
