<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>link styling</title>
    <style>
        a:link {
            color:orange;
            text-decoration: none;
            background-color:yellow;
            padding:14px 25px;
            text-align: center;
            border:2px solid black;
        }
        a:visited {
            color:green;
            text-decoration: none;
            background-color:cyan;

        }
        a:hover {
            color:hotpink;
            text-decoration: underline;
            background-color:lightgreen;
        }
        a:active {
            color:blue;
            background-color:hotpink;
        }
            
            
    </style>
</head>
<body>
    <h1>Style a Link</h1>
    <p><a href="https://www.w3schools.com/Css/default.asp" target="_blank">This is a link</a></p>
    <br>
    <span style="cursor:progress">progress</span>
    <br>
</body>
</html>
