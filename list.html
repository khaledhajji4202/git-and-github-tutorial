<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lists</title>
</head>
<body>
    <h2> <span style="border:1px solid red">An Unordered list</span> </h2>
    <ul style="list-style-type:circle;">
        <li style="list-style-type:square;">coffee</li>
        <li style="list-style-type:none;">tea
            <ol>
                <li>black tea</li>
                <li>green tea</li>
            </ol>
        </li>
        <li>milk</li>
    </ul>
    
    <h2><span style="border:1px solid pink">Ordered List</span></h2>
    <ol type="A" start="3">
        <li>Coffee</li>
        <li>Tea
            <ol>
                <li>black tea</li>
                <li>reen tea</li>
            </ol>

        </li>
        <li>Milk</li>
    </ol>
    <h2>Discription List</h2>
    <dl>
        <dt>Coffee</dt>
        <dd>- black hot drink</dd>
        <dt>tea</dt>
        <dd>- different colors hot drink</dd>
        <dt>Milk</dt>
        <dd>- White cold drink</dd>
    </dl>
</body>
</html>
