<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUTLINE</title>
    <style>
        p {
            background-color: green;
            border:8px solid black;
            outline:3px solid red ;
            outline-offset:-5px;
            margin:auto;
            padding:20px;
            text-align: center;
        }
    </style>
</head>
<body>
    
    <h2>CSS Outline</h2>
    <p>This element has a 2px black border 
        and a green outline with a width of 10px.</p>
</body>
</html>
