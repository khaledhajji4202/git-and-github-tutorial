<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown menu</title>
    <style>
        .dropbtn{
            background-color: #4CAF50;
            color:white;
            padding:16px;
            font-size: 16px;
            border:1px dotted black;
            cursor: pointer;
        }
        .dropdown{
            position: relative;
        }
        .dropdown-content{
            display: none;
            position:absolute;
            background-color: azure;
            min-width: 130px;
            box-shadow: 0px 8px 16px 0px
            rgba(0, 0,0, 1);
        }
        .dropdown-content a{
            display:block;
            text-decoration: none;
            padding: 12px 16px;
            color: black;

        }
        .dropdown-content a:hover{
            background-color: #b31f1f;
        }
        .dropdown:hover .dropdown-content{
            display:block;
        }
        .dropdown:hover .dropbtn {
            background-color:green;
        }
    </style>
</head>
<body>
    <h2>Dropdown Menu</h2>
<p>Move the mouse over 
    the button to open the dropdown menu.</p>
    <div class="dropdown">
        <button class="dropbtn">Dropdown Menu</button>
        <div class="dropdown-content">
            <a href="#">Link 1</a>
            <a href="#">link 2</a>
            <a href="#">Link 3</a>
        </div>
    </div>
</body>
</html>
