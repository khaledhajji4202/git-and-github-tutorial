<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elliptical-circular Border</title>
    <style>
       #div1 {
        border-radius: 70px / 30px;
        background-color: #04AA6D;
        width: 200px;
        height: 150px;
       }
       #div2 {
        border-radius: 15px / 50px;
        background-color: #04AA6D;
        width: 200px;
        height: 150px;
       }
       #div3{
        border-radius: 50%;
        background-color: #04AA6D;
        width: 200px;
        height: 150px;
       }
       #div4 {
        border-radius: 50%;
        background-color: #04AA6D;
        width: 200px;
        height: 200px;
       }
    </style>
</head>
<body>
    <h1>The border-radius property</h1>
    <p>Elliptical shape-border radius: 70px/30px</p>
    <div id="div1"></div>
    <p>Elliptical shape-border radius: 15px/50px</p>
    <div id="div2"></div>
    <p>oval shape-border radius: 50%:</p>
    <div id="div3"></div>
    <p>Circular shape - border-radius: 50%:</p>
    <div id="div4"></div>
</body>
</html>
