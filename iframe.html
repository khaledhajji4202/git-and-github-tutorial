<!DOCTYPE html>
<html>

        <title>Iframe Example</title>
    </head>
    <body>
        <h2>Iframe - target for a link</h2>
        <iframe  name="iframe_a" height="300px" width="100%" ></iframe>
        <p><a href="https://www.w3schools.com" target="iframe_a">W3Schools.com</a></p>
    </body>
</html>
