<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table styling</title>
    <style>
        div {
            overflow-x: auto;
        }
        h1 {
            text-transform: capitalize;
        }
        table {
            font-family: Arial, Helvetica, sans-serif;
            border: 1px solid green;
            width:700px;
            border-collapse:collapse;
            table-layout: auto;
            empty-cells: hide;
            caption-side:bottom;
            
        }
        td,th {
            border:1px solid #000;
            padding:10px;
            height:auto;
        }
        tr:nth-child(even) {background-color: #ddd;}

        tr:hover {background-color:aqua;}
        th {
            padding:12px 12px;
            text-align: left;
            background-color: #04aa6d;
            color:white;

        }

        
    </style>
</head>
<body>
    <div class="main">
    <h1>a fancy table </h1>
    <table>
        <tr>
            <th>Company</th>
            <th>Contact</th>
            <th>Country</th>    
        </tr>
        <tr>
            <td>Alfreds Futterkiste</td>
            <td>Maria Anders</td>
            <td>Germany</td>
        </tr>
        <tr>
            <td>Berglunds snabbköp</td>
            <td>Christina Berglund</td>
            <td>Sweden</td>
        </tr>
        <tr>
            <td>Centro comercial Moctezuma</td>
            <td>Francisco Chang</td>
            <td>Mexico</td>
        </tr>
        <tr>
            <td>Ernst Handel</td>
            <td>Roland Mendel</td>
            <td>Austria</td>
        </tr>
    </table>
    </div>
</body>
</html>
