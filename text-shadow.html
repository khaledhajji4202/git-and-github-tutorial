<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS text-shadow</title>
    <style>
        h1 {
            text-shadow: 0 0 3px #FF0000;
        }
        #head1{
            text-shadow:0 0 3px #FF0000, 0 0 5px
            #0000FF;
        }
        #head2{
            color:coral;
            text-shadow:-1px 0 black,0 1px black,
            1px 0 black,0 -1px black;
        }
        
    </style>
</head>
<body>
    <h1>Text-shadow with red neon glow!</h1>
    <h1 id="head1">Text-shadow with red and blue neon glow!</h1>
    <h1 id="head2">Border around text!</h1>
</body>
</html>
