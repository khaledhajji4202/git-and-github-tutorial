<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Output</title>
</head>
<body>
    <h2>The output Element</h2>
    <form action="/action_page.php"
    oninput="x.value=parseInt(a.value)+
    parseInt(b.value)">
    0
    <input type="range" id="a" name="a" value="50">
    100+
    <input type="number" id="b" name="b"
    value="50">
    =
    <output name="x" for="a b"></output><br><br>
    <input type="color" id="favcolor" name="favcolor">
    <label for="favcolor">Select your favorite color</label>
    <label for="datemin">Enter date after 2000-01-01:</label>
    <input type="date" id="datemin" name="datemin" min="2000-01-01"><br><br>
    <input type="datetime-local" id="birthdaytime" name="birthdaytime">
    <label for="birthdaytime">Birthday (date and time):</label>
    <label for="myfile">Select a file:</label>
    <input type="file" id="myfile" name="myfile"><br><br> 
    <input type="hidden" id="custId" name="custId" value="3487">
    <input type="month" id="bdaymonth" name="bdaymonth">
    <label for="bdaymonth">Birthday(month and year):</label>
    <label for="qantity">Quantity (between 1 and 5):</label>
    <input type="number" id="quantity" name="quantity" min="1" max="100"
    step="10" value="15">
    <input type="range" id="vol" name="vol" min="0" max="75">
    <label for="gsearch">Google search:</label>
    <input type="search" id="gsearch" name="gsearch" disabled><br><br>
    <label for="phone">Enter a phone number:</label>
    <input type="tel" id="phone" name="phone" 
    pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}"
    required><br><br>
    <label for="appt">Select a time: </label>
    <input type="time" id="appt" name="appt">
    <input type="submit">
    </form>
</body>
</html>
